name: Build container images

# Builds the custom puente service images (swarmui, fooocus) and pushes
# them to GHCR. The corresponding service classes specify both `image:`
# (for fast pulls in normal use) and `build:` (as a fallback when the
# image hasn't been published yet — e.g. forks, dev, first push).
#
# musicgen is intentionally not built here — we use the upstream
# ashleykza/tts-webui image (a multi-model TTS bundle that already
# solves the audiocraft+PyAV+ffmpeg dependency mess we'd otherwise
# inherit). See puente/services/musicgen.py for context.
#
# Triggers:
#   - push to main when a Dockerfile or this workflow changes
#   - manual dispatch (force a rebuild)
#   - release publication (build with semver tags)

on:
  push:
    branches: [main]
    paths:
      - 'puente/dockerfiles/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [swarmui, fooocus]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/puente-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: puente/dockerfiles/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
